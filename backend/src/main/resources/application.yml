spring:
  application:
    name: paw-track-backend
  datasource:
    url: jdbc:h2:mem:pawtrack;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/pawtrack
    driver-class-name: org.postgresql.Driver
    username: pawtrack
    password: pawtrack
